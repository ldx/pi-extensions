name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux sandbox dependencies
        run: sudo apt-get update && sudo apt-get install -y bubblewrap socat ripgrep

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
